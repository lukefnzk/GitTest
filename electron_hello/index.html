<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <!-- CSP: 인라인 스크립트만 허용(외부 로드 차단) — Electron 보안 권장 -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'"
    />
    <title>Electron Hello World</title>
    <style>
      /* [web_class 비교] 그때 배운 CSS 그대로 데스크톱 앱에 쓴다. 이게 Electron의 핵심 장점. */
      body {
        font-family: 'Malgun Gothic', system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        background: #1e1e2e;
        color: #eeeeee;
        user-select: none;
      }
      h1 {
        margin: 0 0 4px;
      }
      .sub {
        color: #aaaaaa;
        margin: 0;
        font-size: 13px;
      }
      button {
        margin-top: 20px;
        padding: 10px 22px;
        font-size: 16px;
        cursor: pointer;
        border: none;
        border-radius: 8px;
        background: #7c5cff;
        color: white;
      }
      button:hover {
        background: #6a4bff;
      }
      #msg {
        margin-top: 16px;
        min-height: 24px;
        font-size: 18px;
      }
      .ver {
        margin-top: 28px;
        font-size: 12px;
        color: #888888;
      }
    </style>
  </head>
  <body>
    <h1>👋 Hello, Electron!</h1>
    <p class="sub">Node가 연 창 안에서 도는 웹페이지</p>

    <button id="greetBtn">인사 받기</button>
    <div id="msg"></div>

    <!-- preload가 노출한 버전 정보가 여기 찍힌다 -->
    <div class="ver" id="ver"></div>

    <script>
      // [web_class 비교] 08~09 레슨의 DOM 조작 그대로다. 여긴 React 아님, 순수 JS.
      const btn = document.getElementById('greetBtn')
      const msg = document.getElementById('msg')
      let count = 0

      btn.addEventListener('click', () => {
        count += 1
        msg.textContent = `안녕하세요! (${count}번째 인사)`
      })

      // preload.js 가 window.appInfo 로 얹어준 버전 정보를 읽어 화면에 표시
      const v = window.appInfo
      document.getElementById('ver').textContent =
        `Electron ${v.electron} · Node ${v.node} · Chromium ${v.chrome}`
    </script>
  </body>
</html>
