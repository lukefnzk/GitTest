<!DOCTYPE html>
<!-- 02. CSS 기초
     CSS 는 HTML 요소를 '어떻게 보이게 할지'(색·크기·간격·배치)를 정한다.
     HTML 이 뼈대라면 CSS 는 옷이다. -->
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>02 CSS 기초</title>

    <!-- CSS 를 넣는 3가지 방법:
         1) 인라인:  <p style="color:red">          (요소에 직접 — 급할 때만)
         2) 내부:    <style> ... </style>            (이 파일처럼 head 안에)
         3) 외부:    <link rel="stylesheet" href="style.css">  (별도 .css 파일 — 실무 기본, 09번에서 사용)
    -->
    <style>
      /* ---- 선택자(selector): 누구를 꾸밀지 고른다 ---- */

      /* 태그 선택자: 모든 <body> 에 적용 */
      body {
        font-family: sans-serif; /* 글꼴 */
        background: #f5f5f5; /* 배경색 (#rrggbb 16진수) */
        color: #333; /* 글자색 */
      }

      /* 클래스 선택자: class="box" 인 요소들. 점(.) 으로 시작 — 여러 곳에 재사용 */
      .box {
        /* ★ 박스 모델: 모든 요소는 4겹 상자다
           바깥 → 안:  margin(바깥여백) → border(테두리) → padding(안쪽여백) → content(내용) */
        width: 200px;
        padding: 16px; /* 내용과 테두리 사이 */
        border: 2px solid #4a90d9; /* 테두리:  두께 종류 색 */
        margin: 12px; /* 다른 요소와의 바깥 간격 */
        background: white;
        border-radius: 8px; /* 모서리 둥글게 */
      }

      /* id 선택자: id="special" 인 '단 하나'. 샵(#) 으로 시작 */
      #special {
        color: crimson;
        font-weight: bold;
      }

      /* 여러 선택자에 같은 스타일: 쉼표로 나열 */
      h1,
      h2 {
        color: #4a90d9;
      }
    </style>
  </head>
  <body>
    <h1>CSS 기초</h1>

    <!-- class 로 스타일 공유 (같은 .box 규칙이 둘 다에 적용됨) -->
    <div class="box">첫 번째 박스</div>
    <div class="box">두 번째 박스</div>

    <!-- id 로 하나만 특별하게 -->
    <p id="special">이 문장은 id 로 빨갛게.</p>

    <!-- [핵심] class 는 '여러 개에 재사용', id 는 '딱 하나'.
         실무·React 에서는 대부분 class 를 쓴다.
         F12 개발자도구 > Elements 탭에서 요소를 클릭하면
         어떤 CSS 가 적용됐는지 눈으로 볼 수 있다. -->
  </body>
</html>
