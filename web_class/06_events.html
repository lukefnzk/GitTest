<!DOCTYPE html>
<!-- 06. 이벤트 — 사용자 동작에 반응하기
     클릭·입력·제출 같은 '사건(event)'이 일어나면 지정한 함수를 실행한다.
     기본 형태:  요소.addEventListener("사건이름", 실행할함수) -->
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>06 이벤트</title>
    <style>
      body { font-family: sans-serif; margin: 20px; }
      button { padding: 8px 14px; margin: 4px; cursor: pointer; }
      #log { margin-top: 12px; color: #4a90d9; min-height: 1.2em; }
      #chips button { background: #eee; border: none; border-radius: 12px; }
    </style>
  </head>
  <body>
    <h1>이벤트</h1>

    <!-- 1) 클릭 -->
    <button id="btn">눌러보세요</button>
    <p id="count">0 번 클릭</p>

    <!-- 2) 입력 (실시간 반영) -->
    <input id="nameInput" placeholder="이름 입력" />
    <p id="greeting">입력을 기다리는 중…</p>

    <!-- 3) 폼 제출 -->
    <form id="form">
      <input id="msgInput" placeholder="메시지" autocomplete="off" />
      <button type="submit">제출</button>
    </form>

    <!-- 4) 이벤트 위임 (버튼이 여러 개일 때) -->
    <div id="chips">
      <button>사과</button>
      <button>바나나</button>
      <button>포도</button>
    </div>

    <p id="log"></p>

    <script>
      const log = document.querySelector("#log");

      // 1) 클릭 — 누를 때마다 함수 실행
      let clicks = 0;
      document.querySelector("#btn").addEventListener("click", () => {
        clicks++;
        document.querySelector("#count").textContent = `${clicks} 번 클릭`;
      });

      // 2) 입력 — input 이벤트는 글자가 바뀔 때마다 발생.
      //    e = 이벤트 객체, e.target = 사건이 난 요소, .value = 현재 입력값
      document.querySelector("#nameInput").addEventListener("input", (e) => {
        const name = e.target.value;
        // 11_modern_syntax 의 삼항: 값이 있으면 인사, 없으면 안내
        document.querySelector("#greeting").textContent = name
          ? `${name}님 안녕하세요`
          : "입력을 기다리는 중…";
      });

      // 3) 폼 제출 — e.preventDefault() 로 '새로고침(폼의 기본 동작)'을 막는다
      document.querySelector("#form").addEventListener("submit", (e) => {
        e.preventDefault(); // ★ 이거 없으면 제출 시 페이지가 새로고침돼 버린다
        const input = document.querySelector("#msgInput");
        log.textContent = `제출됨: ${input.value}`;
        input.value = ""; // 입력칸 비우기
      });

      // 4) 이벤트 위임 — 자식마다 붙이지 말고 '부모 하나(#chips)'에 붙이고 e.target 으로 구분.
      document.querySelector("#chips").addEventListener("click", (e) => {
        if (e.target.tagName === "BUTTON") {
          // 버튼을 눌렀을 때만
          log.textContent = `${e.target.textContent} 선택`;
        }
      });
      // ★ 위임은 09번 투두에서 '삭제 버튼이 계속 늘어날 때' 진가를 발휘한다.
    </script>
  </body>
</html>
