<!DOCTYPE html>
<!-- 09. 미니 프로젝트 — 투두리스트 (HTML/CSS/JS 3파일 분리)
     실무·React 프로젝트처럼 역할별로 파일을 나눴다:
       index.html : 뼈대(구조)      style.css : 꾸미기      app.js : 동작(로직)
     이 파일은 두 친구를 <link> 와 <script> 로 불러오기만 한다. -->
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>09 투두리스트</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <h1>할 일</h1>

      <!-- 입력 폼 -->
      <form id="form">
        <input id="input" placeholder="할 일을 입력하고 Enter" autocomplete="off" />
        <button type="submit">추가</button>
      </form>

      <!-- 남은 개수 표시 -->
      <p id="counter"></p>

      <!-- 목록은 app.js 가 state 로부터 채운다 (처음엔 비어 있음) -->
      <ul id="list"></ul>
    </div>

    <!-- defer: HTML 을 다 읽은 뒤 실행 -->
    <script src="app.js" defer></script>
  </body>
</html>
